/* TOPBAR */
.topbar{
    background:#0d47a1;
    padding:10px;
    display:flex;
    justify-content:space-around;

.topbar a{
    color:white;
    text-decoration:none;

/* HEADER */
.header{
    text-align:center;
    padding:40px;
    background:#e3f2fd;
}
.header h1{
    color:#0d47a1;
}

/* GALLERY */
.gallery{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    padding:30px 0;
}

/* IMAGE BOX */
.img-box{
    overflow:hidden;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

.img-box img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.4s;
}

/* HOVER EFFECT */
.img-box:hover img{
    transform:scale(1.1);
}

/* FOOTER */
.footer{
    background:#0d47a1;
    color:white;
    text-align:center;
    padding:15px;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:green;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
}
</style>
